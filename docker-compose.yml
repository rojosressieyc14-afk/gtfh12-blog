version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: pulseblog-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD-rootpassword}
      MYSQL_DATABASE: ${DB_NAME-blog_system}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pulseblog-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD-rootpassword}
      DB_NAME: ${DB_NAME-blog_system}
      JWT_SECRET: ${JWT_SECRET-change-me-secret}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD-admin123}
      WEB_ORIGIN: ${WEB_ORIGIN-https://www.kangban.online}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN-https://www.kangban.online}
      CORS_ORIGINS: ${CORS_ORIGINS-}
      GIN_MODE: ${GIN_MODE-release}
      UPLOAD_DIR: /app/uploads
    expose:
      - "8080"
    volumes:
      - upload_data:/app/uploads
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: pulseblog-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html/web:ro
      - ./admin/dist:/usr/share/nginx/html/admin:ro
    networks:
      - app-network

volumes:
  db_data:
  upload_data:

networks:
  app-network:
    driver: bridge
