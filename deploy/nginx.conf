upstream api {
    server api:8080;
}

server {
    listen 80;
    server_name www.kangban.online;
    client_max_body_size 20M;

    # Security: hide nginx version
    server_tokens off;

    # Security: Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.deepseek.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self';";

    # Security: block sensitive paths
    location ~* /\.(git|env|htaccess|svn|idea|dockerignore|DS_Store) {
        deny all;
        return 403;
    }
    location ~* (Dockerfile|docker-compose\.yml|\.env\.|composer\.json|package-lock\.json) {
        deny all;
        return 403;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Web frontend at /PulseBlog/ ──
    location /PulseBlog/ {
        rewrite ^/PulseBlog(/.*)$ $1 break;
        root /usr/share/nginx/html/web;
        index index.html;
        try_files $uri /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html/web;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Admin frontend at /PulseBlog/admin/ ──
    location /PulseBlog/admin/ {
        rewrite ^/PulseBlog/admin(/.*)$ $1 break;
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html/admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API at /PulseBlog/api/ ──
    location /PulseBlog/api/ {
        rewrite ^/PulseBlog/api(/.*)$ $1 break;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files at /PulseBlog/uploads/ ──
    location /PulseBlog/uploads/ {
        rewrite ^/PulseBlog/uploads(/.*)$ $1 break;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Redirect root to /PulseBlog/ ──
    location = / {
        return 301 /PulseBlog/;
    }
}
